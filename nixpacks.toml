# nixpacks.toml
# Railway Nixpacks 빌드 설정.
# 목적: scripts/run_migrations.sh 가 psql CLI 를 사용하므로 postgresql-client 필요.
# Procfile 의 release-phase 가 빌드 산출물 사용 시점에서 psql 호출.

[phases.setup]
aptPkgs = ["postgresql-client"]

# install phase 전체 override — Railway nixpacks 가 NIXPACKS_UV_VERSION env 미설정 시
# `pip install uv==` (빈 specifier) 로 빌드 실패하던 문제 우회.
# uv 버전 직접 박아서 env var 의존 제거.
[phases.install]
dependsOn = ["setup"]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install 'uv==0.11.7' && uv sync --no-dev --frozen"
]
